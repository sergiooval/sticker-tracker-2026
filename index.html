<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#006341" />
  <title>Sticker Tracker 2026</title>
  <link rel="manifest" href="./manifest.json?v=1000" />
  <link rel="apple-touch-icon" href="./assets/icon-180.png?v=1000" />
  <link rel="stylesheet" href="./styles.css?v=1000" />
</head>
<body>
  <div class="app">
    <header class="hero">
      <nav class="topbar">
        <img src="./assets/logo.png?v=1000" alt="Sticker Tracker 2026" class="app-logo" />
        <div>
          <h1>Sticker Tracker 2026</h1>
          <p>Control rápido de pegadas, faltantes y repetidas.</p>
        </div>
      </nav>

      <section class="stats">
        <article><strong id="ownedCount">0</strong><span>Pegadas</span></article>
        <article><strong id="missingCount">0</strong><span>Faltantes</span></article>
        <article><strong id="dupCount">0</strong><span>Repetidas</span></article>
        <article><strong id="progressPct">0%</strong><span>Avance</span></article>
      </section>
    </header>

    <main>
      <section class="actions-card">
        <div>
          <h2>Modo cámara</h2>
          <p>Toma una foto de una página del álbum y úsala como referencia mientras marcas tus stickers.</p>
        </div>
        <label class="camera-btn">
          Abrir cámara
          <input id="cameraInput" type="file" accept="image/*" capture="environment" hidden />
        </label>
      </section>

      <section id="photoPanel" class="photo-panel hidden">
        <img id="previewImage" alt="Preview de página" />
        <button id="closePhoto">Cerrar foto</button>
      </section>

      <section class="filters">
        <input id="search" type="search" placeholder="Buscar equipo o código: ARG, México, FWC..." />
        <select id="statusFilter">
          <option value="all">Todos</option>
          <option value="missing">Faltantes</option>
          <option value="owned">Pegadas</option>
          <option value="dup">Repetidas</option>
        </select>
      </section>

      <section id="teams" class="team-grid"></section>
    </main>
  </div>

  <footer class="bottom-actions">
    <button id="exportBtn" class="primary">Exportar progreso</button>
    <label class="import-btn primary">Importar respaldo<input id="importInput" type="file" accept="application/json" hidden /></label>
    <button id="resetBtn" class="danger">Reiniciar</button>
  </footer>

  <script src="./data.js?v=1000"></script>
  <script src="./app.js?v=1000"></script>
</body>
</html>
